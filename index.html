<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Data Pegawai</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h3 class="mb-4">Data Pegawai</h3>

<button class="btn btn-primary mb-3" onclick="showForm()">ADD DATA</button>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Nama Pegawai</th>
<th>NPP</th>
<th>Jabatan</th>
<th>Region</th>
<th>COU</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tabelData"></tbody>

</table>

</div>


<!-- MODAL FORM -->

<div class="modal fade" id="formModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Tambah Data</h5>
<button class="btn-close" onclick="hideForm()"></button>
</div>

<div class="modal-body">

<input class="form-control mb-2" id="nama" placeholder="Nama Pegawai">
<input class="form-control mb-2" id="npp" placeholder="NPP">
<input class="form-control mb-2" id="jabatan" placeholder="Jabatan">
<input class="form-control mb-2" id="region" placeholder="Region">
<input class="form-control mb-2" id="cou" placeholder="COU">

</div>

<div class="modal-footer">
<button class="btn btn-success" onclick="addData()">Simpan</button>
<button class="btn btn-secondary" onclick="hideForm()">Batal</button>
</div>

</div>

</div>

</div>


<script>

var url = "https://script.google.com/macros/s/AKfycbyJxDOBsdXNxC_zw1nDiKS53RGmlLQMbHkvI_OxXjP4jd2nBaRXurI0M5UnRgUtT-ZV/exec";

function jsonp(url){

var s = document.createElement("script");
s.src = url;
document.body.appendChild(s);

}


// LOAD DATA

function loadData(){

jsonp(url+"?action=read&callback=showData");

}

function showData(data){

var html="";

data.forEach(function(r){

html += `
<tr>
<td>${r.nama}</td>
<td>${r.npp}</td>
<td>${r.jabatan}</td>
<td>${r.region}</td>
<td>${r.cou}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="deleteData(${r.row})">Hapus</button>
</td>
</tr>
`;

});

document.getElementById("tabelData").innerHTML = html;

}


// TAMBAH DATA

function addData(){

var nama = document.getElementById("nama").value;
var npp = document.getElementById("npp").value;
var jabatan = document.getElementById("jabatan").value;
var region = document.getElementById("region").value;
var cou = document.getElementById("cou").value;

jsonp(url+`?action=add&nama=${nama}&npp=${npp}&jabatan=${jabatan}&region=${region}&cou=${cou}&callback=afterAdd`);

}

function afterAdd(){

hideForm();
loadData();

}


// HAPUS DATA

function deleteData(row){

if(confirm("Hapus data?")){

jsonp(url+`?action=delete&row=${row}&callback=afterDelete`);

}

}

function afterDelete(){

loadData();

}


// MODAL

function showForm(){

var modal = new bootstrap.Modal(document.getElementById('formModal'));
modal.show();

}

function hideForm(){

var modal = bootstrap.Modal.getInstance(document.getElementById('formModal'));
modal.hide();

}


loadData();

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
